<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hot & Fresh Cuisine</title>

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  color:white;

  background: linear-gradient(135deg,#0f0f0f,#1a0000,#001a00);
}

/* LOGO */
.header{
  text-align:center;
  padding:30px 20px;
}

.logo{
  width:220px;
  background:#111;
  padding:15px;
  border-radius:20px;
}

/* TITEL */
h1{
  font-size:40px;
  margin:15px 0;
}

.subtitle{
  color:#ffcc00;
}

/* NAV BUTTONS */
.nav{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:10px;
  padding:20px;
}

.nav button{
  background:#222;
  border:none;
  color:white;
  padding:10px 15px;
  border-radius:20px;
  cursor:pointer;
}

.nav button:hover{
  background:#ff3c3c;
}

/* SEKTION */
.section{
  background:rgba(255,255,255,0.05);
  margin:20px;
  padding:20px;
  border-radius:20px;
}

/* GERICHT */
.item{
  display:flex;
  align-items:center;
  gap:15px;
  margin-bottom:15px;
}

.item img{
  width:80px;
  height:80px;
  border-radius:10px;
  object-fit:cover;
}

.item-text{
  flex:1;
}

.price{
  color:#ffcc00;
  font-weight:bold;
}

/* SOCIAL */
.social{
  text-align:center;
  margin:30px;
}

.social a{
  display:inline-block;
  margin:10px;
  padding:10px 20px;
  background:#222;
  border-radius:20px;
  color:white;
  text-decoration:none;
}

.social a:hover{
  background:#ff3c3c;
}
</style>
</head>

<body>

<div class="header">
  <img src="logo.png" class="logo">
  <h1>Hot & Fresh Cuisine</h1>
  <div class="subtitle">Frisch • Heiß • Lecker</div>
</div>

<div class="nav">
  <button onclick="scrollToSection('pizza')">🍕 Pizza</button>
  <button onclick="scrollToSection('burger')">🍔 Burger</button>
  <button onclick="scrollToSection('afghan')">🍛 Afghanisch</button>
  <button onclick="scrollToSection('snacks')">🍟 Snacks</button>
  <button onclick="scrollToSection('drinks')">🥤 Getränke</button>
</div>

<!-- PIZZA -->
<div id="pizza" class="section">
  <h2>🍕 Pizza</h2>

  <div class="item">
    <img src="https://images.unsplash.com/photo-1601924582975-7c1c9f3f6b36">
    <div class="item-text">
      Margherita<br>
      <small>Käse & Tomate</small>
    </div>
    <div class="price">6,50 €</div>
  </div>

</div>

<!-- BURGER -->
<div id="burger" class="section">
  <h2>🍔 Burger</h2>

  <div class="item">
    <img src="https://images.unsplash.com/photo-1550547660-d9450f859349">
    <div class="item-text">
      Cheeseburger
    </div>
    <div class="price">4,50 €</div>
  </div>

</div>

<!-- AFGHAN -->
<div id="afghan" class="section">
  <h2>🍛 Afghanische Gerichte</h2>

  <div class="item">
    <img src="https://images.unsplash.com/photo-1631452180539-96aca7d48617">
    <div class="item-text">
      Qabili Palau<br>
      <small>Reis mit Fleisch & Karotten</small>
    </div>
    <div class="price">10,00 €</div>
  </div>

</div>

<!-- SNACKS -->
<div id="snacks" class="section">
  <h2>🍟 Snacks</h2>

  <div class="item">
    <img src="https://images.unsplash.com/photo-1571091718767-18b5b1457add">
    <div class="item-text">
      Pommes
    </div>
    <div class="price">3,50 €</div>
  </div>

</div>

<!-- GETRÄNKE -->
<div id="drinks" class="section">
  <h2>🥤 Getränke</h2>

  <div class="item">
    <img src="https://images.unsplash.com/photo-1581006852262-e4307cf6283a">
    <div class="item-text">
      Cola 0,33l
    </div>
    <div class="price">2,50 €</div>
  </div>

</div>

<!-- SOCIAL -->
<div class="social">
  <a href="https://instagram.com/hot.fresh.duisburg7" target="_blank">📸 Instagram</a>
  <a href="https://tiktok.com/@tiktok.hotfresh7" target="_blank">🎵 TikTok</a>
</div>

<script>
function scrollToSection(id){
  document.getElementById(id).scrollIntoView({behavior:"smooth"});
}
</script>

</body>
</html>
